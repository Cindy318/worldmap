<!DOCTYPE html>

<title>World History – 5000-Year Timeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111827;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 20px;background:#1a2535;border-bottom:1px solid #2d3f55;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.1rem;font-weight:700;color:#7dd3fc}
header p{font-size:0.75rem;color:#64748b}
#app{display:flex;flex:1;overflow:hidden}

/* Timeline area */
#timeline-wrap{flex:1;overflow:auto;position:relative}
#timeline-inner{display:flex;min-height:100%}
#year-axis{width:70px;flex-shrink:0;position:sticky;left:0;z-index:10;background:#111827;border-right:1px solid #1e3448}
#columns-area{display:flex;flex:1;position:relative}
.civ-col{display:flex;flex-direction:column;position:relative;min-width:90px;flex:1;border-right:1px solid #1e3448}
.civ-header{position:sticky;top:0;z-index:9;background:#1a2535;border-bottom:2px solid;font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:6px 4px;text-align:center;min-height:44px;display:flex;align-items:center;justify-content:center;line-height:1.2}
.era-tick{position:absolute;left:0;right:0;border-top:1px dashed #1e3448;pointer-events:none;display:flex;align-items:center}
.year-label{font-size:0.62rem;color:#4a6380;padding:1px 4px;position:sticky;left:0;width:70px;flex-shrink:0}
.block{position:absolute;left:2px;right:2px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:0.58rem;font-weight:600;text-align:center;line-height:1.2;padding:2px;transition:filter .15s,transform .1s;border:1px solid rgba(0,0,0,.2)}
.block:hover{filter:brightness(1.25);transform:scaleX(1.02);z-index:5}
.block.active{outline:2px solid #fff;z-index:6;filter:brightness(1.3)}
.block span{overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}

/* Panel */
#panel{width:340px;flex-shrink:0;background:#162032;border-left:1px solid #243447;display:flex;flex-direction:column;overflow:hidden}
#panel-inner{flex:1;overflow-y:auto;padding:20px}
#panel-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#4a6380;gap:10px;text-align:center;padding:24px}
#panel-placeholder svg{opacity:.3}
#panel-detail{display:none}
#panel-title{font-size:1.3rem;font-weight:700;color:#f1f5f9;margin-bottom:2px}
#panel-subtitle{font-size:0.8rem;color:#7dd3fc;margin-bottom:4px}
#panel-years{font-size:0.78rem;color:#64748b;margin-bottom:16px}
.section-head{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4a7fa5;border-bottom:1px solid #243447;padding-bottom:5px;margin-bottom:10px}
.leader-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #1a2d42;gap:8px}
.leader-name{font-size:0.82rem;font-weight:600;color:#e2e8f0}
.leader-title{font-size:0.7rem;color:#94a3b8}
.leader-years{font-size:0.72rem;color:#64748b;text-align:right;flex-shrink:0}
.leader-duration{font-size:0.68rem;color:#4a7fa5}
.event-row{padding:7px 0;border-bottom:1px solid #1a2d42;display:flex;gap:10px}
.event-year{font-size:0.72rem;font-weight:700;color:#f59e0b;flex-shrink:0;width:60px}
.event-desc{font-size:0.78rem;color:#cbd5e1;line-height:1.35}
.section-block{margin-bottom:20px}
.panel-color-bar{height:4px;border-radius:2px;margin-bottom:14px}

// ── Build layout ──────────────────────────────────────────────────────────────
const TOTAL_YEARS = MAX_YEAR - MIN_YEAR;
const TOTAL_HEIGHT = TOTAL_YEARS * PX_PER_YEAR;
const HEADER_H = 44;

function yearToY(year) {
  return ((year - MIN_YEAR) / TOTAL_YEARS) * TOTAL_HEIGHT + HEADER_H;
}

function buildTimeline() {
  const axisEl = document.getElementById("year-axis");
  const colsEl = document.getElementById("columns-area");

  // Era labels on axis
  const eras = [
    {year:-4000,label:"4000 BCE"},{year:-3000,label:"3000 BCE"},{year:-2000,label:"2000 BCE"},
    {year:-1000,label:"1000 BCE"},{year:-500,label:"500 BCE"},{year:0,label:"0 CE"},
    {year:500,label:"500 CE"},{year:1000,label:"1000 CE"},{year:1200,label:"1200 CE"},
    {year:1400,label:"1400 CE"},{year:1600,label:"1600 CE"},{year:1800,label:"1800 CE"},
    {year:1900,label:"1900"},{year:1950,label:"1950"},{year:2000,label:"2000"},
  ];

  axisEl.style.position = "relative";
  axisEl.style.height = (TOTAL_HEIGHT + HEADER_H + 10) + "px";

  // Axis header
  const axisHdr = document.createElement("div");
  axisHdr.style.cssText = "height:44px;position:sticky;top:0;background:#111827;z-index:11;border-bottom:1px solid #1e3448;";
  axisEl.appendChild(axisHdr);

  eras.forEach(({year,label}) => {
    const tick = document.createElement("div");
    const top = yearToY(year);
    tick.style.cssText = `position:absolute;top:${top}px;left:0;right:0;`;
    tick.innerHTML = `<span style="font-size:0.6rem;color:#4a7fa5;padding:1px 4px;display:block">${label}</span>`;
    axisEl.appendChild(tick);

    // Horizontal grid line across all cols
    const line = document.createElement("div");
    line.style.cssText = `position:absolute;top:${top}px;left:0;right:0;border-top:1px dashed #1e3448;pointer-events:none;z-index:1`;
    axisEl.appendChild(line);
  });

  // Build civ columns
  CIVS.forEach(civ => {
    const col = document.createElement("div");
    col.className = "civ-col";
    col.style.height = (TOTAL_HEIGHT + HEADER_H + 10) + "px";

    const hdr = document.createElement("div");
    hdr.className = "civ-header";
    hdr.style.borderBottomColor = civ.color;
    hdr.style.color = civ.color;
    hdr.textContent = civ.label;
    col.appendChild(hdr);

    colsEl.appendChild(col);
    civ._el = col;
  });

  // Place blocks
  BLOCKS.forEach(b => {
    const civObj = CIVS.find(c => c.id === b.civ);
    if (!civObj) return;

    const top = yearToY(b.start);
    const bottom = yearToY(b.end);
    const height = Math.max(bottom - top, 16);

    const el = document.createElement("div");
    el.className = "block";
    el.style.cssText = `top:${top}px;height:${height}px;background:${b.color};color:#fff;`;
    el.innerHTML = `<span>${b.name}</span>`;
    el.title = `${b.name} (${yLabel(b.start)} – ${yLabel(b.end)})`;

    el.addEventListener("click", (e) => {
      e.stopPropagation();
      document.querySelectorAll(".block.active").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
      showPanel(b);
    });

    civObj._el.appendChild(el);
  });
}

function showPanel(b) {
  document.getElementById("panel-placeholder").style.display = "none";
  const detail = document.getElementById("panel-detail");
  detail.style.display = "block";

  document.getElementById("panel-bar").style.background = b.color;
  document.getElementById("panel-title").textContent = b.name;
  document.getElementById("panel-subtitle").textContent = b.subtitle || "";
  document.getElementById("panel-years").textContent =
    `${yLabel(b.start)} – ${yLabel(b.end)}  ·  ${duration(b.start, b.end)}`;

  // Leaders
  const leadersEl = document.getElementById("panel-leaders");
  if (b.leaders && b.leaders.length) {
    leadersEl.innerHTML = b.leaders.map(l => {
      const dur = l.end - l.start;
      return `
      <div class="leader-row">
        <div>
          <div class="leader-name">${l.name}</div>
          <div class="leader-title">${l.title}</div>
        </div>
        <div class="leader-years">
          <div>${yLabel(l.start)}</div>
          <div class="leader-duration">${dur > 0 ? dur + " yr" + (dur !== 1 ? "s" : "") : "< 1 yr"}</div>
        </div>
      </div>`;
    }).join("");
  } else {
    leadersEl.innerHTML = "<div style='color:#4a6380;font-size:.8rem;padding:8px 0'>No leader data available</div>";
  }

  // Events
  const eventsEl = document.getElementById("panel-events");
  if (b.events && b.events.length) {
    eventsEl.innerHTML = b.events.map(ev =>
      `<div class="event-row">
        <div class="event-year">${yLabel(ev.year)}</div>
        <div class="event-desc">${ev.desc}</div>
      </div>`
    ).join("");
  } else {
    eventsEl.innerHTML = "<div style='color:#4a6380;font-size:.8rem;padding:8px 0'>No events recorded</div>";
  }

  // Scroll panel to top
  document.getElementById("panel-inner").scrollTop = 0;
}

buildTimeline();
</script>
